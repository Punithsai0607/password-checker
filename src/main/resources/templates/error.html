<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error — Password Validator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1p8mTbSk1hSEp+F+Gv3pKJFLQ6Ga+2"
          crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="bg-gradient-animated"></div>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="glass-card p-5 text-center">
                    <div class="mb-4">
                        <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 4rem;"></i>
                    </div>
                    <h2 class="text-white fw-bold mb-3">Something Went Wrong</h2>
                    <p class="text-white-50 mb-2" th:if="${errorCode}">
                        Error Code: <span class="text-warning" th:text="${errorCode}">UNKNOWN</span>
                    </p>
                    <p class="text-white-50 mb-4" th:if="${errorMessage}" th:text="${errorMessage}">
                        An unexpected error occurred.
                    </p>
                    <p class="text-white-50 mb-4" th:unless="${errorMessage}">
                        An unexpected error occurred. Please try again.
                    </p>
                    <a th:href="@{/}" class="btn btn-primary-custom">
                        <i class="bi bi-house-fill me-2"></i>Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
